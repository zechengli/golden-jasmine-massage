<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Jasmine Massage - Admin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f8f6f3;
      color: #333;
    }
    header {
      background: #7a5c3c;
      color: white;
      padding: 25px 20px;
      text-align: center;
    }
    header h1 { margin: 0; font-size: 1.8em; }
    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .controls {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls label { font-weight: 600; }
    .controls input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1em;
    }
    .controls button {
      padding: 10px 18px;
      background: #d4a574;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .controls button:hover { background: #b88a5e; }
    .summary {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .summary h2 { margin-top: 0; color: #7a5c3c; }
    .summary p { font-size: 1.1em; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #d4a574;
      color: white;
    }
    tr:hover { background: #faf7f2; }
    .empty {
      text-align: center;
      padding: 40px;
      color: #777;
    }
  </style>
</head>
<body>
  <header>
    <h1>Golden Jasmine Massage - Admin Dashboard</h1>
  </header>

  <div class="container">
    <div class="controls">
      <label for="filterDate">Filter by date:</label>
      <input type="date" id="filterDate">
      <button onclick="loadAppointments()">Load</button>
      <button onclick="showAll()">Show All</button>
    </div>

    <div class="summary">
      <h2>Daily Summary</h2>
      <p id="summaryText">Select a date to see summary.</p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Service</th>
          <th>Duration</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="appointmentsBody">
        <tr><td colspan="7" class="empty">No appointments to show.</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('filterDate').value = today;

    async function loadAppointments() {
      const date = document.getElementById('filterDate').value;
      const url = date ? `/api/appointments?date=${date}` : '/api/appointments';
      const res = await fetch(url);
      const rows = await res.json();
      render(rows, date);
    }

    function showAll() {
      document.getElementById('filterDate').value = '';
      loadAppointments();
    }

    function render(rows, date) {
      const tbody = document.getElementById('appointmentsBody');
      tbody.innerHTML = '';

      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">No appointments found.</td></tr>';
        document.getElementById('summaryText').textContent = date
          ? `No appointments on ${date}.`
          : 'No appointments in the system.';
        return;
      }

      let total = 0;
      rows.forEach(row => {
        total += row.price;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.date}</td>
          <td>${row.time}</td>
          <td>${row.name}</td>
          <td>${row.phone}</td>
          <td>${row.service}</td>
          <td>${row.duration} min</td>
          <td>$${row.price}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('summaryText').textContent = date
        ? `${rows.length} appointment(s) on ${date}. Estimated revenue: $${total}.`
        : `${rows.length} total appointment(s). Estimated revenue: $${total}.`;
    }

    loadAppointments();
  </script>
</body>
</html>
